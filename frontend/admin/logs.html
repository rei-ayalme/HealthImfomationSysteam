<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>系统日志 - 健康数据洞察平台管理端</title>
    <style>
        

        

        /* 主布局 */
        .main-container {
            display: flex;
            min-height: 100vh;
        }

        /* 侧边栏 */
        .sidebar {
            width: 240px;
            background: #1a365d;
            color: white;
            padding: 24px 0;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
        }

        .sidebar-header {
            padding: 0 24px 24px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .logo-text {
            font-size: 18px;
            font-weight: 600;
        }

        .nav-menu {
            margin-top: 24px;
        }

        .sidebar-menu li {
            margin: 2px 0;
        }

        .sidebar-menu a {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 24px;
            color: rgba(255,255,255,0.65);
            text-decoration: none;
            font-size: 14px;
            transition: all 0.3s;
            border-left: 3px solid transparent;
        }

        .sidebar-menu a:hover {
            background: rgba(255,255,255,0.1);
            color: #fff;
        }

        .sidebar-menu a.active {
            background: rgba(255,255,255,0.15);
            color: #fff;
            border-left-color: #4299e1;
        }

        .menu-icon {
            width: 20px;
            text-align: center;
        }

        /* 内容区 */
        .content {
            flex: 1;
            margin-left: 240px;
            padding: 24px;
        }

        .page-header {
            margin-bottom: 24px;
        }

        .page-title {
            font-size: 28px;
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 8px;
        }

        .page-subtitle {
            font-size: 14px;
            color: #8c8c8c;
        }

        /* 统计卡片 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
        }

        .stat-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }

        .stat-label {
            font-size: 14px;
            color: #8c8c8c;
        }

        .stat-icon {
            font-size: 24px;
        }

        .stat-value {
            font-size: 28px;
            font-weight: 700;
            color: #1a1a1a;
        }

        .stat-change {
            font-size: 13px;
            color: #52c41a;
            margin-top: 4px;
        }

        /* 筛选栏 */
        .filter-bar {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 24px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
        }

        .filter-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr) auto;
            gap: 16px;
            align-items: end;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .filter-label {
            font-size: 13px;
            font-weight: 500;
            color: #1a1a1a;
        }

        .filter-input,
        .filter-select {
            padding: 10px 12px;
            border: 1px solid #d9d9d9;
            border-radius: 6px;
            font-size: 14px;
            background: white;
        }

        .filter-input:focus,
        .filter-select:focus {
            outline: none;
            border-color: #1890ff;
        }

        .filter-btn {
            padding: 10px 20px;
            background: #1890ff;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .filter-btn:hover {
            background: #40a9ff;
        }

        .filter-btn.secondary {
            background: white;
            color: #595959;
            border: 1px solid #d9d9d9;
        }

        .filter-btn.secondary:hover {
            border-color: #1890ff;
            color: #1890ff;
        }

        /* 日志表格 */
        .logs-container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
            overflow: hidden;
        }

        .logs-header {
            padding: 20px;
            border-bottom: 1px solid #e8e8e8;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logs-title {
            font-size: 16px;
            font-weight: 600;
            color: #1a1a1a;
        }

        .logs-actions {
            display: flex;
            gap: 12px;
        }

        .action-btn {
            padding: 8px 16px;
            border: 1px solid #d9d9d9;
            border-radius: 6px;
            background: white;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .action-btn:hover {
            border-color: #1890ff;
            color: #1890ff;
        }

        .action-btn.primary {
            background: #1890ff;
            color: white;
            border-color: #1890ff;
        }

        .action-btn.primary:hover {
            background: #40a9ff;
        }

        .logs-table {
            width: 100%;
            border-collapse: collapse;
        }

        .logs-table th {
            background: #fafafa;
            padding: 14px 16px;
            text-align: left;
            font-size: 13px;
            font-weight: 600;
            color: #1a1a1a;
            border-bottom: 1px solid #e8e8e8;
        }

        .logs-table td {
            padding: 14px 16px;
            font-size: 13px;
            color: #595959;
            border-bottom: 1px solid #f0f0f0;
        }

        .logs-table tr:hover {
            background: #f5f5f5;
        }

        .log-level {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 500;
        }

        .log-level.info {
            background: #e6f7ff;
            color: #1890ff;
        }

        .log-level.warning {
            background: #fffbe6;
            color: #faad14;
        }

        .log-level.error {
            background: #fff1f0;
            color: #ff4d4f;
        }

        .log-level.debug {
            background: #f6ffed;
            color: #52c41a;
        }

        .log-message {
            max-width: 400px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .log-message:hover {
            white-space: normal;
            word-break: break-all;
        }

        /* 分页 */
        .pagination {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px;
            border-top: 1px solid #e8e8e8;
        }

        .pagination-info {
            font-size: 13px;
            color: #8c8c8c;
        }

        .pagination-controls {
            display: flex;
            gap: 8px;
        }

        .page-btn {
            padding: 8px 12px;
            border: 1px solid #d9d9d9;
            border-radius: 6px;
            background: white;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.3s;
        }

        .page-btn:hover:not(:disabled) {
            border-color: #1890ff;
            color: #1890ff;
        }

        .page-btn.active {
            background: #1890ff;
            color: white;
            border-color: #1890ff;
        }

        .page-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* 日志详情模态框 */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: white;
            border-radius: 12px;
            width: 90%;
            max-width: 700px;
            max-height: 80vh;
            overflow: hidden;
            animation: modalSlideIn 0.3s ease;
        }

        /* 通知弹窗相关动画已合并到主CSS */
        @keyframes modalSlideIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        @keyframes slideOut {
            from { transform: translateX(0); opacity: 1; }
            to { transform: translateX(100%); opacity: 0; }
        }

        .modal-header {
            padding: 20px;
            border-bottom: 1px solid #e8e8e8;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .modal-title {
            font-size: 18px;
            font-weight: 600;
            color: #1a1a1a;
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #8c8c8c;
            padding: 0;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
            transition: all 0.3s;
        }

        .modal-close:hover {
            background: #f5f5f5;
            color: #1a1a1a;
        }

        .modal-

        .detail-row {
            display: flex;
            margin-bottom: 16px;
        }

        .detail-label {
            width: 120px;
            font-size: 13px;
            color: #8c8c8c;
            flex-shrink: 0;
        }

        .detail-value {
            flex: 1;
            font-size: 14px;
            color: #1a1a1a;
        }

        .detail-stack {
            background: #f5f5f5;
            padding: 16px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            line-height: 1.6;
            overflow-x: auto;
            white-space: pre-wrap;
            word-break: break-all;
        }

        .modal-footer {
            padding: 16px 20px;
            border-top: 1px solid #e8e8e8;
            display: flex;
            justify-content: flex-end;
            gap: 12px;
        }

        /* 响应式 */
        @media (max-width: 1200px) {
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .filter-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        @media (max-width: 768px) {
            .sidebar {
                display: none;
            }

            .content {
                margin-left: 0;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }

            .filter-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>

</head>

            { id: 16, level: 'error', time: '2024-01-15 14:21:10', module: 'auth', message: '登录失败次数过多 - username: hacker, attempts: 10, locked: true', user: 'hacker', ip: '45.123.45.67', stack: '' },
            { id: 17, level: 'info', time: '2024-01-15 14:20:45', module: 'api', message: '数据导出完成 - user_id: 12345, file: report_20240115.xlsx, size: 5.2MB', user: 'admin', ip: '192.168.1.100', stack: '' },
            { id: 18, level: 'debug', time: '2024-01-15 14:19:30', module: 'ai', message: '模型推理 - input_shape: [1, 128], output_shape: [1, 10]', user: 'system', ip: '-', stack: '' },
            { id: 19, level: 'info', time: '2024-01-15 14:18:22', module: 'crawler', message: '数据更新完成 - source: WorldBank, records: 2,456, duration: 45s', user: 'system', ip: '-', stack: '' },
            { id: 20, level: 'warning', time: '2024-01-15 14:17:05', module: 'system', message: '磁盘空间不足 - path: /var/log, usage: 92%, threshold: 90%', user: 'system', ip: '-', stack: '' }
        ];

        // 渲染日志表格
        function renderLogs() {
            const tbody = document.getElementById('logsTableBody');
            tbody.innerHTML = logData.map(log => `
                <tr>
                    <td><span class="log-level ${log.level}">${getLevelText(log.level)}</span></td>
                    <td>${log.time}</td>
                    <td>${getModuleText(log.module)}</td>
                    <td class="log-message" title="${log.message}">${log.message}</td>
                    <td>${log.user}<br><small style="color:#8c8c8c">${log.ip}</small></td>
                    <td><button class="action-btn" onclick="viewLogDetail(${log.id})">查看</button></td>
                </tr>
            `).join('');
        }

        // 获取级别文本
        function getLevelText(level) {
            const levels = {
                'error': '错误',
                'warning': '警告',
                'info': '信息',
                'debug': '调试'
            };
            return levels[level] || level;
        }

        // 获取模块文本
        function getModuleText(module) {
            const modules = {
                'api': 'API网关',
                'database': '数据库',
                'auth': '认证服务',
                'ai': 'AI预测服务',
                'crawler': '数据爬虫',
                'system': '系统服务'
            };
            return modules[module] || module;
        }

        // 查看日志详情
        function viewLogDetail(id) {
            const log = logData.find(l => l.id === id);
            if (!log) return;

            const modalBody = document.getElementById('modalBody');
            modalBody.innerHTML = `
                <div class="detail-row">
                    <div class="detail-label">日志ID</div>
                    <div class="detail-value">#${log.id}</div>
                </div>
                <div class="detail-row">
                    <div class="detail-label">日志级别</div>
                    <div class="detail-value"><span class="log-level ${log.level}">${getLevelText(log.level)}</span></div>
                </div>
                <div class="detail-row">
                    <div class="detail-label">时间戳</div>
                    <div class="detail-value">${log.time}</div>
                </div>
                <div class="detail-row">
                    <div class="detail-label">模块/服务</div>
                    <div class="detail-value">${getModuleText(log.module)}</div>
                </div>
                <div class="detail-row">
                    <div class="detail-label">用户</div>
                    <div class="detail-value">${log.user}</div>
                </div>
                <div class="detail-row">
                    <div class="detail-label">IP地址</div>
                    <div class="detail-value">${log.ip}</div>
                </div>
                <div class="detail-row">
                    <div class="detail-label">消息内容</div>
                    <div class="detail-value">${log.message}</div>
                </div>
                ${log.stack ? `
                <div class="detail-row">
                    <div class="detail-label">堆栈跟踪</div>
                    <div class="detail-value">
                        <div class="detail-stack">${log.stack}</div>
                    </div>
                </div>
                ` : ''}
            `;

            document.getElementById('logDetailModal').classList.add('active');
        }

        // 关闭模态框
        function closeModal() {
            document.getElementById('logDetailModal').classList.remove('active');
        }

        // 复制日志详情
        function copyLogDetail() {
            showNotification('日志详情已复制到剪贴板', 'success');
        }

        // 查询日志
        function searchLogs() {
            showNotification('正在查询日志...', 'info');
            setTimeout(() => {
                renderLogs();
                showNotification('查询完成', 'success');
            }, 500);
        }

        // 重置筛选
        function resetFilters() {
            document.getElementById('levelFilter').value = '';
            document.getElementById('moduleFilter').value = '';
            document.getElementById('startTime').value = '';
            document.getElementById('endTime').value = '';
            document.getElementById('keywordFilter').value = '';
            showNotification('筛选条件已重置', 'info');
        }

        // 刷新日志
        function refreshLogs() {
            showNotification('正在刷新日志...', 'info');
            setTimeout(() => {
                renderLogs();
                showNotification('日志已刷新', 'success');
            }, 1000);
        }

        // 导出日志
        function exportLogs() {
            showNotification('正在导出日志...', 'info');
            setTimeout(() => {
                showNotification('日志导出成功！', 'success');
            }, 1500);
        }

        // 清理旧日志
        function clearLogs() {
            if (confirm('确定要清理30天前的日志吗？此操作不可恢复。')) {
                showNotification('正在清理旧日志...', 'info');
                setTimeout(() => {
                    showNotification('旧日志清理完成', 'success');
                }, 2000);
            }
        }

        // 显示通知
        function showNotification(message, type) {
            const notification = document.createElement('div');
            notification.style.cssText = `
                position: fixed;
                top: 20px;
                right: 20px;
                padding: 12px 20px;
                border-radius: 8px;
                color: white;
                font-size: 14px;
                z-index: 9999;
                animation: slideIn 0.3s ease;
                background: ${type === 'success' ? '#52c41a' : type === 'error' ? '#ff4d4f' : '#1890ff'};
            `;
            notification.textContent = message;
            document.body.appendChild(notification);

            setTimeout(() => {
                notification.style.animation = 'slideOut 0.3s ease';
                setTimeout(() => notification.remove(), 300);
            }, 3000);
        }

        // 页面加载完成后渲染日志
        document.addEventListener('DOMContentLoaded', function () {
            renderLogs();

            // 设置默认时间
            const now = new Date();
            const yesterday = new Date(now - 24 * 60 * 60 * 1000);
            document.getElementById('endTime').value = now.toISOString().slice(0, 16);
            document.getElementById('startTime').value = yesterday.toISOString().slice(0, 16);
        });

        // 点击模态框外部关闭
        document.getElementById('logDetailModal').addEventListener('click', function (e) {
            if (e.target === this) {
                closeModal();
            }
        });
    </script>
    <script>
        (function syncAdminNavState() {
            const current = location.pathname.split('/').pop();
            document.querySelectorAll('.sidebar-menu a, .nav-menu .nav-item').forEach(link => {
                link.classList.remove('active');
                const href = link.getAttribute('href');
                if (href && href === current) link.classList.add('active');
            });
        })();
    </script>
</body>

</html>
