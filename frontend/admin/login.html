<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@100..900&display=swap" rel="stylesheet">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>健康数据洞察平台 - 管理端登录</title>
    <style>
        

        

        .login-container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            padding: 40px;
            width: 400px;
            max-width: 90%;
            text-align: center;
        }

        

        

        .logo-text {
            font-size: 20px;
            font-weight: 600;
            color: #1a365d;
        }

        .login-title {
            font-size: 24px;
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 8px;
        }

        .login-subtitle {
            font-size: 14px;
            color: #8c8c8c;
            margin-bottom: 32px;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: #595959;
            margin-bottom: 8px;
        }

        .form-input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #d9d9d9;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s;
        }

        .form-input:focus {
            outline: none;
            border-color: #1890ff;
            box-shadow: 0 0 0 3px rgba(24,144,255,0.1);
        }

        .form-input::placeholder {
            color: #bfbfbf;
        }

        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .remember-me label {
            font-size: 14px;
            color: #595959;
            cursor: pointer;
        }

        .forgot-password {
            font-size: 14px;
            color: #1890ff;
            text-decoration: none;
            transition: color 0.3s;
        }

        .forgot-password:hover {
            color: #40a9ff;
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #1890ff, #096dd9);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 24px;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(24,144,255,0.4);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 24px 0;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #e8e8e8;
        }

        .divider-text {
            padding: 0 16px;
            font-size: 14px;
            color: #8c8c8c;
        }

        .social-login {
            display: flex;
            gap: 12px;
            justify-content: center;
        }

        .social-btn {
            flex: 1;
            padding: 10px;
            border: 1px solid #d9d9d9;
            border-radius: 8px;
            background: white;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 14px;
            color: #595959;
        }

        .social-btn:hover {
            border-color: #1890ff;
            color: #1890ff;
        }

        .footer {
            margin-top: 32px;
            font-size: 12px;
            color: #8c8c8c;
        }

        .footer a {
            color: #1890ff;
            text-decoration: none;
        }

        .footer a:hover {
            text-decoration: underline;
        }

        .error-message {
            background: #fff1f0;
            border: 1px solid #ffccc7;
            border-radius: 6px;
            padding: 12px;
            margin-bottom: 20px;
            color: #f5222d;
            font-size: 14px;
            display: none;
        }

        @media (max-width: 480px) {
            .login-container {
                padding: 30px 20px;
            }
            
            
            
            .login-title {
                font-size: 20px;
            }
        }
    </style>
    <link rel="stylesheet" href="/assets/css/common.css">
    <script src="/assets/js/common.js"></script>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <div class="logo-icon">🏥</div>
            <div class="logo-text">健康数据洞察平台</div>
        </div>
        
        <h2 class="login-title">管理端登录</h2>
        <p class="login-subtitle">请输入您的账号和密码</p>
        
        <div class="error-message" id="errorMessage">
            <span>⚠️</span>
            <span id="errorText">账号或密码错误，请重新输入</span>
        </div>
        
        <form id="adminLoginForm">
            <div class="form-group">
                <label class="form-label" for="username">用户名</label>
                <input type="text" class="form-input" id="username" placeholder="请输入用户名" required>
            </div>

            <div class="form-group">
                <label class="form-label" for="password">密码</label>
                <input type="password" class="form-input" id="password" placeholder="请输入密码" required>
            </div>

            <div class="form-options">
                <div class="remember-me">
                    <input type="checkbox" id="remember" checked>
                    <label for="remember">记住我</label>
                </div>
                <a href="#" class="forgot-password">忘记密码？</a>
            </div>

            <button type="submit" class="login-btn">登录</button>
        </form>

        <div class="footer">
            © 2026 健康数据洞察平台
        </div>
    </div>

    <script>
        // 监听新的 adminLoginForm 的提交事件
        document.getElementById('adminLoginForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            // 模拟登录验证
            if (username === 'admin' && password === 'admin123') {
                // 登录成功，跳转到管理端仪表盘
                window.location.href = 'dashboard.html';
            } else {
                // 显示错误信息
                const errorMessage = document.getElementById('errorMessage');
                errorMessage.style.display = 'block';

                // 3秒后隐藏错误信息
                setTimeout(() => {
                    errorMessage.style.display = 'none';
                }, 3000);
            }
        });
    </script>
</body>
</html>
