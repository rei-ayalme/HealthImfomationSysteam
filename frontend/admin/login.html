<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@100..900&display=swap" rel="stylesheet">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>健康数据洞察平台 - 管理端登录</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            /* 设置背景图片并添加毛玻璃动感效果，使用 URL 编码处理中文文件名 */
            background: url('/assets/images/login_bg.png') no-repeat center center fixed;
            background-size: cover;
            position: relative;
            font-family: 'Noto Sans SC', sans-serif;
        }

        /* 毛玻璃遮罩层，管理端更深一点 */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 21, 41, 0.6); /* 使用深色主题颜色 */
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            z-index: 1;
        }

        .header {
            position: absolute;
            top: 24px;
            left: 24px;
            z-index: 10;
        }
        
        .back-link {
            color: #fff;
            text-decoration: none;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 4px;
            transition: opacity 0.3s;
        }
        
        .back-link:hover {
            opacity: 0.8;
        }

        .login-container {
            /* 登录框的半透明毛玻璃效果 */
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            padding: 40px;
            width: 400px;
            max-width: 90%;
            text-align: center;
            z-index: 2;
            position: relative;
            /* 动感浮现动画 */
            animation: floatUp 0.6s ease-out forwards;
            /* 居中关键样式 */
            margin: auto;
        }
        
        @keyframes floatUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        

        

        .logo-text {
            font-size: 20px;
            font-weight: 600;
            color: #1a365d;
        }

        .login-title {
            font-size: 24px;
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 8px;
        }

        .login-subtitle {
            font-size: 14px;
            color: #8c8c8c;
            margin-bottom: 32px;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: #595959;
            margin-bottom: 8px;
        }

        .form-input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #d9d9d9;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s;
        }

        .form-input:focus {
            outline: none;
            border-color: #1890ff;
            box-shadow: 0 0 0 3px rgba(24,144,255,0.1);
        }

        .form-input::placeholder {
            color: #bfbfbf;
        }

        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .remember-me label {
            font-size: 14px;
            color: #595959;
            cursor: pointer;
        }

        .forgot-password {
            font-size: 14px;
            color: #1890ff;
            text-decoration: none;
            transition: color 0.3s;
        }

        .forgot-password:hover {
            color: #40a9ff;
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #1890ff, #096dd9);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 24px;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(24,144,255,0.4);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 24px 0;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #e8e8e8;
        }

        .divider-text {
            padding: 0 16px;
            font-size: 14px;
            color: #8c8c8c;
        }

        .social-login {
            display: flex;
            gap: 12px;
            justify-content: center;
        }

        .social-btn {
            flex: 1;
            padding: 10px;
            border: 1px solid #d9d9d9;
            border-radius: 8px;
            background: white;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 14px;
            color: #595959;
        }

        .social-btn:hover {
            border-color: #1890ff;
            color: #1890ff;
        }

        .footer {
            margin-top: 32px;
            font-size: 12px;
            color: #8c8c8c;
        }

        .footer a {
            color: #1890ff;
            text-decoration: none;
        }

        .footer a:hover {
            text-decoration: underline;
        }

        .error-message {
            background: #fff1f0;
            border: 1px solid #ffccc7;
            border-radius: 6px;
            padding: 12px;
            margin-bottom: 20px;
            color: #f5222d;
            font-size: 14px;
            display: none;
        }

        @media (max-width: 480px) {
            .login-container {
                padding: 30px 20px;
            }
            
            
            
            .login-title {
                font-size: 20px;
            }
        }
    </style>
    <link rel="stylesheet" href="/assets/css/common.css">
    <script src="/assets/js/common.js"></script>
</head>
<body>
    <div class="header">
        <a href="/use/index.html" class="back-link">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="19" y1="12" x2="5" y2="12"></line>
                <polyline points="12 19 5 12 12 5"></polyline>
            </svg>
            返回首页
        </a>
    </div>
    <div class="login-container">
        <div class="logo">
            <div class="logo-icon">🏥</div>
            <div class="logo-text">健康数据洞察平台</div>
        </div>
        
        <h2 class="login-title">管理端登录</h2>
        <p class="login-subtitle">请输入您的账号和密码</p>
        
        <div class="error-message" id="errorMessage">
            <span>⚠️</span>
            <span id="errorText">账号或密码错误，请重新输入</span>
        </div>
        
        <form id="adminLoginForm">
            <div class="form-group">
                <label class="form-label" for="username">用户名</label>
                <input type="text" class="form-input" id="username" placeholder="请输入用户名" required>
            </div>

            <div class="form-group" style="position: relative;">
                <label class="form-label" for="password">密码</label>
                <input type="password" class="form-input" id="password" placeholder="请输入密码" required style="padding-right: 36px;">
                <span class="toggle-password" onclick="togglePasswordVisibility('password', 'eyeIconAdmin')" style="position: absolute; right: 10px; top: 38px; cursor: pointer; color: #888;">
                    <svg id="eyeIconAdmin" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                        <circle cx="12" cy="12" r="3"></circle>
                    </svg>
                </span>
            </div>

            <div class="form-options">
                <div class="remember-me">
                    <input type="checkbox" id="remember" checked>
                    <label for="remember">记住我</label>
                </div>
                <a href="#" class="forgot-password">忘记密码？</a>
            </div>

            <button type="submit" class="login-btn">登录</button>
        </form>

        <div class="footer">
            © 2026 健康数据洞察平台
        </div>
    </div>

    <script>
        function togglePasswordVisibility(inputId, iconId) {
            const input = document.getElementById(inputId);
            const icon = document.getElementById(iconId);
            if (input.type === 'password') {
                input.type = 'text';
                icon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line>';
            } else {
                input.type = 'password';
                icon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle>';
            }
        }

        // 监听新的 adminLoginForm 的提交事件
        document.getElementById('adminLoginForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorMessage = document.getElementById('errorMessage');
            const errorText = document.getElementById('errorText');

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: username, password: password })
                });

                if (response.ok) {
                    const data = await response.json();
                    if (data.user.role !== 'admin') {
                        errorText.textContent = '该账号无管理端权限';
                        errorMessage.style.display = 'block';
                    } else {
                        localStorage.setItem('currentUser', JSON.stringify(data.user));
                        window.location.href = 'dashboard.html';
                    }
                } else {
                    const error = await response.json();
                    errorText.textContent = error.detail || '账号或密码错误';
                    errorMessage.style.display = 'block';
                }
            } catch (error) {
                errorText.textContent = '网络错误，无法连接到服务器';
                errorMessage.style.display = 'block';
            }

            // 3秒后隐藏错误信息
            setTimeout(() => {
                errorMessage.style.display = 'none';
            }, 3000);
        });
    </script>
</body>
</html>
