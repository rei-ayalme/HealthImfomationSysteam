<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>健康数据洞察平台 - 系统设置</title>
    <style>
        

        

        .admin-container {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 240px;
            background: #1a365d;
            color: white;
            padding: 24px 0;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
        }

        .sidebar-header {
            padding: 0 24px 24px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        

        

        .logo-text {
            font-size: 18px;
            font-weight: 600;
        }

        .nav-menu {
            margin-top: 24px;
        }

        

        

        

        .nav-icon {
            font-size: 16px;
            width: 20px;
            text-align: center;
        }

        .nav-text {
            font-size: 14px;
        }

        .nav-badge {
            margin-left: auto;
            background: #f56565;
            color: white;
            font-size: 12px;
            padding: 2px 8px;
            border-radius: 10px;
        }

        .main-content {
            flex: 1;
            margin-left: 240px;
        }

        .top-bar {
            background: white;
            padding: 16px 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .top-bar-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .toggle-btn {
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            color: #666;
        }

        .page-title {
            font-size: 20px;
            font-weight: 600;
            color: #1a1a1a;
        }

        .top-bar-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .search-box {
            position: relative;
        }

        .search-input {
            padding: 8px 12px 8px 32px;
            border: 1px solid #d9d9d9;
            border-radius: 20px;
            font-size: 14px;
            width: 200px;
        }

        .search-icon {
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            color: #999;
        }

        .user-menu {
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
        }

        .user-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: #4299e1;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
        }

        .user-info {
            text-align: right;
        }

        .user-name {
            font-size: 14px;
            font-weight: 500;
        }

        .user-role {
            font-size: 12px;
            color: #999;
        }

        .settings-content {
            padding: 24px;
        }

        .content-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .header-title {
            font-size: 18px;
            font-weight: 600;
            color: #1a1a1a;
        }

        .header-description {
            font-size: 14px;
            color: #666;
        }

        .header-actions {
            display: flex;
            gap: 12px;
        }

        .btn {
            padding: 8px 16px;
            border: 1px solid #d9d9d9;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn-primary {
            background: #1890ff;
            color: white;
            border-color: #1890ff;
        }

        .btn-primary:hover {
            background: #40a9ff;
            border-color: #40a9ff;
        }

        .btn-secondary {
            background: white;
            color: #333;
        }

        .btn-secondary:hover {
            border-color: #1890ff;
            color: #1890ff;
        }

        .settings-tabs {
            background: white;
            border-radius: 12px;
            margin-bottom: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        .tab-nav {
            display: flex;
            border-bottom: 1px solid #f0f0f0;
        }

        .tab-item {
            padding: 16px 24px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            color: #666;
            border-bottom: 2px solid transparent;
            transition: all 0.3s;
        }

        .tab-item.active {
            color: #1890ff;
            border-bottom-color: #1890ff;
        }

        .tab-content {
            padding: 24px;
        }

        .settings-card {
            background: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            margin-bottom: 24px;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .card-title {
            font-size: 16px;
            font-weight: 600;
            color: #1a1a1a;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: #666;
            margin-bottom: 8px;
        }

        .form-input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #d9d9d9;
            border-radius: 6px;
            font-size: 14px;
        }

        .form-textarea {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #d9d9d9;
            border-radius: 6px;
            font-size: 14px;
            resize: vertical;
            min-height: 100px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .toggle-switch {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 44px;
            height: 24px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: .4s;
            border-radius: 24px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: #1890ff;
        }

        input:checked + .slider:before {
            transform: translateX(20px);
        }

        .switch-label {
            font-size: 14px;
            color: #666;
        }

        .setting-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 0;
            border-bottom: 1px solid #f0f0f0;
        }

        .setting-item:last-child {
            border-bottom: none;
        }

        .setting-info {
            flex: 1;
        }

        .setting-title {
            font-size: 14px;
            font-weight: 500;
            color: #1a1a1a;
            margin-bottom: 4px;
        }

        .setting-desc {
            font-size: 12px;
            color: #999;
        }

        .info-box {
            background: #e6f7ff;
            border: 1px solid #91d5ff;
            border-radius: 6px;
            padding: 12px 16px;
            margin-bottom: 20px;
        }

        .info-box-title {
            font-size: 14px;
            font-weight: 600;
            color: #1890ff;
            margin-bottom: 8px;
        }

        .info-box-content {
            font-size: 13px;
            color: #666;
            line-height: 1.6;
        }

        @media (max-width: 768px) {
            .sidebar {
                width: 0;
                overflow: hidden;
            }

            .main-content {
                margin-left: 0;
            }

            .form-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
    <link rel="stylesheet" href="/assets/css/common.css">
    <script src="/assets/js/common.js"></script>
</head>
<body>
    <div class="admin-container">
        <div class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <div class="logo-icon">🏥</div>
                    <div class="logo-text">健康数据平台</div>
                </div>
            </div>

            <div class="nav-menu">
                <a href="dashboard.html" class="nav-item">
                    <span class="nav-icon">📊</span>
                    <span class="nav-text">仪表盘</span>
                </a>
                <a href="data-management.html" class="nav-item">
                    <span class="nav-icon">💾</span>
                    <span class="nav-text">数据管理</span>
                    <span class="nav-badge">12</span>
                </a>
                <a href="user-management.html" class="nav-item">
                    <span class="nav-icon">👥</span>
                    <span class="nav-text">用户管理</span>
                </a>
                <a href="system-settings.html" class="nav-item active">
                    <span class="nav-icon">⚙️</span>
                    <span class="nav-text">系统设置</span>
                </a>
                <a href="reports.html" class="nav-item">
                    <span class="nav-icon">📋</span>
                    <span class="nav-text">报表管理</span>
                </a>
                <a href="logs.html" class="nav-item">
                    <span class="nav-icon">📝</span>
                    <span class="nav-text">系统日志</span>
                </a>
                <a href="help.html" class="nav-item">
                    <span class="nav-icon">❓</span>
                    <span class="nav-text">帮助中心</span>
                </a>
            </div>
        </div>

        <div class="main-content">
            <div class="top-bar">
                <div class="top-bar-left">
                    <button class="toggle-btn">☰</button>
                    <h1 class="page-title">系统设置</h1>
                </div>
                <div class="top-bar-right">
                    <div class="search-box">
                        <span class="search-icon">🔍</span>
                        <input type="text" class="search-input" placeholder="搜索设置..." aria-label="全局搜索设置">
                    </div>
                    <div class="user-menu">
                        <div class="user-info">
                            <div class="user-name">管理员</div>
                            <div class="user-role">系统管理员</div>
                        </div>
                        <div class="user-avatar">A</div>
                    </div>
                </div>
            </div>

            <div class="settings-content">
                <div class="content-header">
                    <div class="header-left">
                        <h2 class="header-title">系统设置</h2>
                        <p class="header-description">管理系统配置和参数</p>
                    </div>
                    <div class="header-actions">
                        <button class="btn btn-secondary">
                            <span>🔄</span>
                            <span>重置默认</span>
                        </button>
                        <button class="btn btn-primary">
                            <span>💾</span>
                            <span>保存设置</span>
                        </button>
                    </div>
                </div>

                <div class="settings-tabs">
                    <div class="tab-nav">
                        <div class="tab-item active">基本设置</div>
                        <div class="tab-item">安全设置</div>
                        <div class="tab-item">通知设置</div>
                        <div class="tab-item">备份设置</div>
                    </div>

                    <div class="tab-content">
                        <div class="settings-card">
                            <div class="card-header">
                                <h3 class="card-title">系统基本信息</h3>
                            </div>
                            <form>
                                <div class="form-group">
                                    <label class="form-label" for="sysName">系统名称</label>
                                    <input type="text" id="sysName" class="form-input" value="健康数据洞察平台">
                                </div>
                                <div class="form-group">
                                    <label class="form-label" for="sysDesc">系统描述</label>
                                    <textarea id="sysDesc" class="form-textarea">基于AI的全球健康数据分析平台，提供多维度健康数据洞察和预测分析。</textarea>
                                </div>
                                <div class="form-row">
                                    <div class="form-group">
                                        <label class="form-label" for="sysVersion">系统版本</label>
                                        <input type="text" id="sysVersion" class="form-input" value="v2.1.0" readonly>
                                    </div>
                                    <div class="form-group">
                                        <label class="form-label" for="updateDate">更新时间</label>
                                        <input type="text" id="updateDate" class="form-input" value="2026-03-15" readonly>
                                    </div>
                                </div>
                            </form>
                        </div>

                        <div class="settings-card">
                            <div class="card-header">
                                <h3 class="card-title">系统参数</h3>
                            </div>
                            <div class="setting-item">
                                <div class="setting-info">
                                    <div class="setting-title">数据自动同步</div>
                                    <div class="setting-desc">定期自动同步外部数据源</div>
                                </div>
                                <div class="toggle-switch">
                                    <label class="switch" for="autoSync">
                                        <input type="checkbox" id="autoSync" checked>
                                        <span class="slider"></span>
                                    </label>
                                    <span class="switch-label">已启用</span>
                                </div>
                            </div>
                            <div class="setting-item">
                                <div class="setting-info">
                                    <div class="setting-title">数据缓存</div>
                                    <div class="setting-desc">启用数据缓存以提高性能</div>
                                </div>
                                <div class="toggle-switch">
                                    <label class="switch" for="dataCache">
                                        <input type="checkbox" id="dataCache" checked>
                                        <span class="slider"></span>
                                    </label>
                                    <span class="switch-label">已启用</span>
                                </div>
                            </div>
                            <div class="setting-item">
                                <div class="setting-info">
                                    <div class="setting-title">日志记录</div>
                                    <div class="setting-desc">记录系统操作日志</div>
                                </div>
                                <div class="toggle-switch">
                                    <label class="switch" for="logRecord">
                                        <input type="checkbox" id="logRecord" checked>
                                        <span class="slider"></span>
                                    </label>
                                    <span class="switch-label">已启用</span>
                                </div>
                            </div>
                            <div class="setting-item">
                                <div class="setting-info">
                                    <div class="setting-title">维护模式</div>
                                    <div class="setting-desc">启用维护模式限制用户访问</div>
                                </div>
                                <div class="toggle-switch">
                                    <label class="switch" for="maintainMode">
                                        <input type="checkbox" id="maintainMode">
                                        <span class="slider"></span>
                                    </label>
                                    <span class="switch-label">未启用</span>
                                </div>
                            </div>
                        </div>

                        <div class="settings-card">
                            <div class="card-header">
                                <h3 class="card-title">性能设置</h3>
                            </div>
                            <div class="form-row">
                                <div class="form-group">
                                    <label class="form-label" for="maxUsers">最大并发用户数</label>
                                    <input type="number" id="maxUsers" class="form-input" value="1000">
                                </div>
                                <div class="form-group">
                                    <label class="form-label" for="queryTimeout">单次查询超时时间（秒）</label>
                                    <input type="number" id="queryTimeout" class="form-input" value="30">
                                </div>
                            </div>
                            <div class="form-row">
                                <div class="form-group">
                                    <label class="form-label" for="cacheTime">数据缓存时间（分钟）</label>
                                    <input type="number" id="cacheTime" class="form-input" value="60">
                                </div>
                                <div class="form-group">
                                    <label class="form-label" for="logKeepDays">日志保留天数</label>
                                    <input type="number" id="logKeepDays" class="form-input" value="90">
                                </div>
                            </div>
                        </div>

                        <div class="info-box">
                            <div class="info-box-title">💡 提示</div>
                            <div class="info-box-content">
                                修改系统设置后，部分设置可能需要重启服务才能生效。建议在非高峰时段进行系统设置修改。
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 切换标签
        // 修复：移除了未使用到的参数 index，消除编辑器警告
        document.querySelectorAll('.tab-item').forEach(item => {
            item.addEventListener('click', function() {
                document.querySelectorAll('.tab-item').forEach(i => i.classList.remove('active'));
                this.classList.add('active');
            });
        });
    </script>
    <script>
        (function syncAdminNavState() {
            const current = location.pathname.split('/').pop();
            // 修复：删除了未使用的旧类名 .sidebar-menu a
            document.querySelectorAll('.nav-menu .nav-item').forEach(link => {
                link.classList.remove('active');
                const href = link.getAttribute('href');
                if (href && href === current) link.classList.add('active');
            });
        })();
    </script>
</body>
</html>
