<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户注册 - 健康数据洞察平台</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; background: linear-gradient(135deg,#102a43,#243b53); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .auth-card { width: 100%; max-width: 460px; background: #fff; border-radius: 14px; box-shadow: 0 12px 30px rgba(0,0,0,0.22); padding: 28px; }
        .title { font-size: 24px; font-weight: 700; color: #102a43; margin-bottom: 8px; }
        .subtitle { font-size: 14px; color: #666; margin-bottom: 22px; }
        .field { margin-bottom: 14px; }
        .label { display: block; font-size: 13px; color: #444; margin-bottom: 6px; }
        .input { width: 100%; border: 1px solid #d9d9d9; border-radius: 8px; padding: 10px 12px; font-size: 14px; }
        .input:focus { outline: none; border-color: #1677ff; }
        .btn { width: 100%; border: none; border-radius: 8px; padding: 11px 14px; background: #1677ff; color: #fff; font-size: 14px; font-weight: 600; cursor: pointer; margin-top: 6px; }
        .hint { margin-top: 16px; font-size: 13px; color: #666; text-align: center; }
        .hint a { color: #1677ff; text-decoration: none; }
        .top-links { display: flex; justify-content: space-between; margin-bottom: 16px; }
        .top-links a { font-size: 13px; text-decoration: none; color: #1677ff; }
        .notice { margin-top: 12px; font-size: 13px; color: #135200; background: #f6ffed; border-radius: 8px; padding: 8px 10px; display: none; }
    </style>
</head>
<body>
    <div class="auth-card">
        <div class="top-links">
            <a href="index.html">返回首页</a>
            <a href="login.html">已有账号？去登录</a>
        </div>
        <div class="title">个人用户注册</div>
        <div class="subtitle">创建账号后可使用个人管理端与个性化分析能力</div>
        <form id="registerForm">
            <div class="field">
                <label class="label">姓名</label>
                <input id="nameInput" class="input" type="text" required>
            </div>
            <div class="field">
                <label class="label">手机号</label>
                <input id="accountInput" class="input" type="text" required>
            </div>
            <div class="field">
                <label class="label">邮箱</label>
                <input id="emailInput" class="input" type="email" required>
            </div>
            <div class="field">
                <label class="label">密码</label>
                <input id="passwordInput" class="input" type="password" required>
            </div>
            <button class="btn" type="submit">注册并登录</button>
        </form>
        <div id="notice" class="notice"></div>
    </div>
    <script>
        function showNotice(message) {
            const notice = document.getElementById('notice');
            notice.style.display = 'block';
            notice.textContent = message;
        }
        document.getElementById('registerForm').addEventListener('submit', function (e) {
            e.preventDefault();
            const name = document.getElementById('nameInput').value.trim();
            const account = document.getElementById('accountInput').value.trim();
            const email = document.getElementById('emailInput').value.trim();
            const password = document.getElementById('passwordInput').value;
            if (!name || !account || !email || !password) {
                showNotice('请填写完整注册信息');
                return;
            }
            const users = JSON.parse(localStorage.getItem('userAccounts') || '[]');
            const exists = users.some(item => item.account === account || item.email === email);
            if (exists) {
                showNotice('该手机号或邮箱已注册，请直接登录');
                return;
            }
            const user = { id: Date.now(), name, account, email, password, role: 'user', createdAt: new Date().toISOString() };
            users.push(user);
            localStorage.setItem('userAccounts', JSON.stringify(users));
            localStorage.setItem('currentUser', JSON.stringify(user));
            showNotice('注册成功，正在进入个人管理端...');
            setTimeout(() => {
                window.location.href = 'account-center.html';
            }, 700);
        });
    </script>
</body>
</html>
