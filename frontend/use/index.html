    <script>
        /* global echarts */

        const kpiGrid = document.getElementById('kpiGrid');
        const reportText = document.getElementById('reportText');
        const newsList = document.getElementById('newsList');
        const searchInput = document.querySelector('.search-box input');
        const trendChart = echarts.init(document.getElementById('trendChart'));
        const pieChart = echarts.init(document.getElementById('pieChart'));
        const mapChart = echarts.init(document.getElementById('mapChart'));
        let activeMapCountry = null;

        const kpiMap = {
            dalys: [
                { n: '总DALYs', v: '2.85B', c: '+1.8%', up: true },
                { n: '预期寿命', v: '73.2', c: '+0.6%', up: true },
                { n: '死亡人数', v: '58.0M', c: '-1.2%', up: false },
                { n: '健康不平等指数', v: '0.42', c: '-2.8%', up: false }
            ],
            deaths: [
                { n: '死亡总数', v: '58.0M', c: '-1.2%', up: false },
                { n: '过早死亡', v: '20.4M', c: '-1.9%', up: false },
                { n: '可避免死亡', v: '12.8M', c: '-3.1%', up: false },
                { n: '老龄相关死亡', v: '25.5M', c: '+2.7%', up: true }
            ],
            prevalence: [
                { n: '总体患病率', v: '18.4%', c: '+0.9%', up: true },
                { n: '慢病患病率', v: '12.1%', c: '+1.2%', up: true },
                { n: '传染病患病率', v: '3.6%', c: '-2.3%', up: false },
                { n: '精神疾病患病率', v: '2.7%', c: '+0.4%', up: true }
            ],
            ylls: [
                { n: 'YLLs总量', v: '1.64B', c: '-0.8%', up: false },
                { n: '心血管YLLs', v: '0.42B', c: '-0.6%', up: false },
                { n: '癌症YLLs', v: '0.31B', c: '+0.2%', up: true },
                { n: '呼吸系统YLLs', v: '0.19B', c: '-1.1%', up: false }
            ],
            ylds: [
                { n: 'YLDs总量', v: '0.83B', c: '+1.5%', up: true },
                { n: '精神障碍YLDs', v: '0.18B', c: '+1.7%', up: true },
                { n: '骨骼肌肉YLDs', v: '0.14B', c: '+1.2%', up: true },
                { n: '糖尿病YLDs', v: '0.08B', c: '+2.3%', up: true }
            ]
        };

        // 将从后端动态获取指标数据
        async function fetchKPIData(region, metric, year) {
            try {
                const response = await fetch(`/api/dataset?limit=10`);
                if (response.ok) {
                    const data = await response.json();
                    if (data.items && data.items.length > 0) {
                        const regionFiltered = data.items.filter(i => {
                            if (region === 'global') return true;
                            const country = (i.country || '').toLowerCase();
                            return country.includes(region.toLowerCase()) || region.toLowerCase().includes(country);
                        });
                        const candidates = regionFiltered.length >= 4 ? regionFiltered : data.items;
                        const selected = candidates.slice(0, 4).map((item, idx) => {
                            const rawValue = Number(item.value);
                            const value = Number.isFinite(rawValue) ? rawValue.toFixed(2) : '--';
                            return {
                                n: item.name || `指标${idx + 1}`,
                                v: value,
                                c: item.year ? `${item.year}` : '最新',
                                up: idx % 2 === 0,
                                src: item.unit || '真实数据'
                            };
                        });
                        if (selected.length) {
                            while (selected.length < 4) {
                                selected.push({
                                    n: `指标${selected.length + 1}`,
                                    v: '--',
                                    c: '暂无',
                                    up: false,
                                    src: '待补充'
                                });
                            }
                            return selected;
                        }
                    }
                }
            } catch (e) {
                console.warn('获取真实 KPI 失败，使用静态数据', e);
            }
            return kpiMap[metric] || kpiMap.dalys;
        }

        async function renderKPI(region, metric, year) {
            kpiGrid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 20px;">数据加载中...</div>';
            const kpiData = await fetchKPIData(region, metric, year);
            
            kpiGrid.innerHTML = '';
            if (!Array.isArray(kpiData) || kpiData.length === 0) {
                kpiGrid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 20px; color: #8c8c8c;">暂无可展示指标</div>';
                return;
            }
            kpiData.forEach(item => {
                const card = document.createElement('div');
                card.className = 'kpi-card';
                // 使用图标区分趋势并增加数据来源角标
                const trendIcon = item.up ? '↑' : '↓';
                const trendClass = item.up ? 'kpi-up' : 'kpi-down';
                const sourceText = item.src || 'GBD 2019';
                card.innerHTML = `
                    <div class="kpi-source-tag">${sourceText}</div>
                    <div class="kpi-name">${item.n}</div>
                    <div class="kpi-value">${item.v}</div>
                    <div class="kpi-change ${trendClass}">
                        <span>${trendIcon}</span>
                        <span>${item.c}</span>
                    </div>
                `;
                kpiGrid.appendChild(card);
            });
        }

        function getDashboardState() {
            return {
                region: document.getElementById('region').value,
                metric: document.getElementById('metric').value,
                year: document.getElementById('year').value,
                granularity: document.getElementById('granularity').value
            };
        }

        function normalizeRegionForApi(region) {
            const mapping = {
                global: 'global',
                east_asia: 'east_asia',
                southeast_asia: 'southeast_asia',
                europe: 'europe',
                north_america: 'usa'
            };
            return mapping[region] || region;
        }

        async function fetchTrendData(region, metric, year) {
            try {
                const normalizedRegion = normalizeRegionForApi(region);
                const endYear = Number(year) || 2024;
                const startYear = Math.max(1990, endYear - 14);
                const response = await fetch(`/api/chart/trend?region=${normalizedRegion}&metric=${metric}&start_year=${startYear}&end_year=${endYear}`);
                if (response.ok) {
                    const data = await response.json();
                    const points = data?.series?.[0]?.data || [];
                    if (Array.isArray(data?.xAxis) && data.xAxis.length >= 2 && Array.isArray(points) && points.length >= 2) {
                        return data;
                    }
                }
            } catch (e) {
                console.warn('获取真实趋势数据失败，降级使用模拟数据');
            }
            return null;
        }

        async function renderTrend(region, metric, year, granularity) {
            const anchorYears = [1990, 1995, 2000, 2005, 2010, 2015, 2020, 2024];
            const map = {
                dalys: [2.33, 2.30, 2.27, 2.35, 2.50, 2.68, 2.85, 2.85],
                deaths: [50, 52, 53, 54, 55, 57, 60, 58],
                prevalence: [11.2, 11.8, 12.4, 13.3, 14.8, 16.1, 17.5, 18.4],
                ylls: [1.74, 1.73, 1.71, 1.70, 1.69, 1.67, 1.66, 1.64],
                ylds: [0.59, 0.61, 0.64, 0.68, 0.72, 0.76, 0.80, 0.83]
            };
            const factor = region === 'global' ? 1 : region === 'east_asia' ? 0.86 : region === 'southeast_asia' ? 0.74 : region === 'europe' ? 0.53 : 0.61;
            
            // 首先尝试从真实后端接口获取
            trendChart.showLoading({ text: '加载真实数据...', color: '#1890ff' });
            const realData = await fetchTrendData(region, metric, year);
            trendChart.hideLoading();

            if (realData) {
                const realSeries = Array.isArray(realData.series) ? realData.series[0] : null;
                // 如果有真实数据，直接使用真实数据渲染
                trendChart.setOption({
                    tooltip: { trigger: 'axis' },
                    grid: { left: '3%', right: '4%', bottom: '3%', containLabel: true },
                    xAxis: { type: 'category', data: realData.xAxis },
                    yAxis: { type: 'value', name: '真实数值 (DALYs)' },
                    series: [{
                        name: metric.toUpperCase() + ' (真实数据)',
                        type: 'line',
                        smooth: true,
                        data: realSeries ? realSeries.data : [],
                        areaStyle: { color: 'rgba(24,144,255,0.12)' },
                        lineStyle: { color: '#1890ff' }
                    }]
                });
                return;
            }

            // 降级：如果没有获取到或者数据库还没数据，使用原本的平滑曲线模拟
            const yearly = [];

            for (let i = 0; i < anchorYears.length - 1; i++) {
                const yStart = anchorYears[i];
                const yEnd = anchorYears[i + 1];
                const vStart = map[metric][i] * factor;
                const vEnd = map[metric][i + 1] * factor;
                const span = yEnd - yStart;
                for (let y = yStart; y < yEnd; y++) {
                    const t = (y - yStart) / span;
                    yearly.push({ y: String(y), v: +(vStart + (vEnd - vStart) * t).toFixed(2) });
                }
            }
            yearly.push({ y: String(anchorYears[anchorYears.length - 1]), v: +(map[metric][map[metric].length - 1] * factor).toFixed(2) });

            const filtered = yearly.filter(item => Number(item.y) <= Number(year));
            const sampled = granularity === 'five' ? filtered.filter(item => Number(item.y) % 5 === 0 || item.y === year) : filtered;
            const years = sampled.map(item => item.y);
            const values = sampled.map(item => item.v);

            trendChart.setOption({
                tooltip: { trigger: 'axis' },
                grid: { left: '3%', right: '4%', bottom: '3%', containLabel: true },
                xAxis: { type: 'category', data: years },
                yAxis: { type: 'value' },
                series: [{
                    name: metric.toUpperCase(),
                    type: 'line',
                    smooth: true,
                    data: values,
                    areaStyle: { color: 'rgba(24,144,255,0.12)' },
                    lineStyle: { color: '#1890ff' }
                }]
            });
        }

        function renderPie(region) {
            const map = {
                global: [{ n: '非传染性疾病', v: 82.5 }, { n: '传染性疾病', v: 16.8 }, { n: '伤害', v: 11.6 }],
                east_asia: [{ n: '非传染性疾病', v: 78.2 }, { n: '传染性疾病', v: 13.4 }, { n: '伤害', v: 8.4 }],
                southeast_asia: [{ n: '非传染性疾病', v: 62.0 }, { n: '传染性疾病', v: 28.3 }, { n: '伤害', v: 9.7 }],
                europe: [{ n: '非传染性疾病', v: 86.1 }, { n: '传染性疾病', v: 7.3 }, { n: '伤害', v: 6.6 }],
                north_america: [{ n: '非传染性疾病', v: 84.7 }, { n: '传染性疾病', v: 6.5 }, { n: '伤害', v: 8.8 }]
            };
            pieChart.setOption({
                tooltip: { trigger: 'item' },
                legend: { bottom: 0 },
                series: [{
                    type: 'pie',
                    radius: ['42%', '72%'],
                    data: map[region].map(i => ({ name: i.n, value: i.v }))
                }]
            });
        }

        function renderReport(region, year) {
            reportText.textContent = `${year}年视角：${reportPool[region] || reportPool.global}`;
        }

        async function renderNews(keyword = '') {
            const key = keyword.trim();
            newsList.innerHTML = '<div style="padding: 20px; color: #8c8c8c;">正在加载最新健康资讯...</div>';
            
            try {
                // 尝试通过后端获取真实资讯
                const response = await fetch('/api/news');
                if (response.ok) {
                    const data = await response.json();
                    if (data.status === 'success' && data.news && data.news.length > 0) {
                        newsList.innerHTML = '';
                        const filteredNews = data.news.filter(item => !key || item.title.includes(key) || item.description.includes(key));
                        
                        if (filteredNews.length === 0) {
                            newsList.innerHTML = '<div style="padding: 20px; color: #8c8c8c;">未找到匹配的资讯</div>';
                            return;
                        }
                        
                        filteredNews.forEach(item => {
                            const box = document.createElement('div');
                            box.className = 'news-item';
                            box.style.cursor = 'pointer';
                            box.onclick = () => window.open(item.url, '_blank');
                            box.innerHTML = `
                                <h4>${item.title}</h4>
                                <p>${item.description}</p>
                                <span style="font-size: 11px; color: #bfbfbf;">来源: ${item.source} | ${item.publishedAt.slice(0,10)}</span>
                            `;
                            newsList.appendChild(box);
                        });
                        return;
                    }
                }
            } catch (e) {
                console.warn('获取真实资讯失败，降级使用静态数据', e);
            }
            
            // 降级静态数据
            newsList.innerHTML = '';
            const filteredStatic = newsPool.filter(item => !key || item.t.includes(key) || item.d.includes(key));
            
            if (filteredStatic.length === 0) {
                newsList.innerHTML = '<div style="padding: 20px; color: #8c8c8c;">未找到匹配的资讯</div>';
                return;
            }
            
            filteredStatic.forEach(item => {
                const box = document.createElement('div');
                box.className = 'news-item';
                box.style.cursor = 'pointer';
                box.onclick = () => alert('当前为模拟静态数据，无真实链接。');
                box.innerHTML = `<h4>${item.t}</h4><p>${item.d}</p><span style="font-size: 11px; color: #bfbfbf;">来源: 平台资讯库</span>`;
                newsList.appendChild(box);
            });
        }

        function syncNavState() {
            const current = location.pathname.split('/').pop() || 'index.html';
            document.querySelectorAll('.nav-item[data-nav], .dropdown-item[data-nav]').forEach(el => {
                el.classList.remove('active');
                if (el.getAttribute('data-nav') === current) el.classList.add('active');
            });
        }

        function normalizeCountryKey(countryName) {
            const alias = {
                'unitedstatesofamerica': 'unitedstates',
                'unitedstates': 'unitedstates',
                'usa': 'unitedstates',
                'korearepublicof': 'southkorea',
                'republicofkorea': 'southkorea',
                'southkorea': 'southkorea',
                'russianfederation': 'russia',
                'vietnam': 'vietnam',
                'uk': 'unitedkingdom',
                'unitedkingdom': 'unitedkingdom'
            };
            const raw = String(countryName || '').toLowerCase().replace(/[^a-z0-9]/g, '');
            return alias[raw] || raw;
        }

        function getStableMapValue(countryName, state) {
            const seedText = `${countryName}|${state.metric}|${state.year}`;
            let hash = 0;
            for (let i = 0; i < seedText.length; i++) {
                hash = ((hash << 5) - hash + seedText.charCodeAt(i)) | 0;
            }
            const baseMap = { dalys: 62, deaths: 54, prevalence: 38, ylls: 41, ylds: 33 };
            const base = baseMap[state.metric] || 50;
            const noise = Math.abs(hash % 1000) / 1000;
            const yearFactor = 1 + ((Number(state.year || 2024) - 2010) * 0.004);
            const value = base * yearFactor * (0.78 + noise * 0.44);
            return Math.max(1, Math.min(100, Number(value.toFixed(2))));
        }

        async function fetchWorldMetricData(state) {
            try {
                const res = await fetch(`/api/map/world-metrics?region=${state.region}&metric=${state.metric}&year=${state.year}`);
                if (!res.ok) return { dataMap: new Map(), meta: null };
                const payload = await res.json();
                if (payload.status !== 'success' || !Array.isArray(payload.data)) {
                    return { dataMap: new Map(), meta: payload?.meta || null };
                }
                const dataMap = new Map();
                payload.data.forEach(item => {
                    const key = normalizeCountryKey(item.country);
                    if (!key) return;
                    dataMap.set(key, item);
                });
                return { dataMap, meta: payload.meta || null };
            } catch (e) {
                console.warn('获取地图指标失败，降级为可复现回退算法', e);
                return { dataMap: new Map(), meta: null };
            }
        }

        async function renderMap(state) {
            try {
                mapChart.showLoading({text: "正在加载地图..."});
                const geoJsonRes = await fetch('/api/geojson/world');
                if (!geoJsonRes.ok) {
                    throw new Error('网络响应不正常');
                }
                const geoJson = await geoJsonRes.json();
                
                if (geoJson.status === "error") {
                    throw new Error(geoJson.msg);
                }

                echarts.registerMap('world', geoJson);
                const { dataMap: worldMetricMap } = await fetchWorldMetricData(state);

                const regionCountries = {
                    'east_asia': ['China', 'Japan', 'South Korea', 'Mongolia', 'North Korea', 'Taiwan'],
                    'southeast_asia': ['Vietnam', 'Thailand', 'Indonesia', 'Malaysia', 'Philippines', 'Singapore', 'Myanmar'],
                    'europe': ['France', 'Germany', 'United Kingdom', 'Italy', 'Spain', 'Russia', 'Ukraine', 'Poland', 'Switzerland'],
                    'north_america': ['United States of America', 'Canada', 'Mexico']
                };
                const focusSet = new Set((regionCountries[state.region] || []).map(normalizeCountryKey));

                const mapData = geoJson.features.map(f => {
                    const countryName = f.properties.name;
                    const countryKey = normalizeCountryKey(countryName);
                    const backendItem = worldMetricMap.get(countryKey);
                    const fallbackValue = getStableMapValue(countryName, state);
                    const inRegionFocus = state.region === 'global' ? true : focusSet.has(countryKey);
                    let val = backendItem ? Number(backendItem.value) : fallbackValue;
                    if (Number.isNaN(val)) val = fallbackValue;
                    if (state.region !== 'global' && !inRegionFocus) {
                        val = Math.min(val, 12);
                    }
                    const sourceType = backendItem?.source_type || 'fallback';
                    const sourceLabel = sourceType === 'international'
                        ? '国际数据'
                        : sourceType === 'local'
                            ? '本地数据'
                            : '算法回退';
                    const method = backendItem?.method || 'reproducible_fallback_v1';

                    return {
                        name: countryName,
                        value: Number(val.toFixed(2)),
                        indicator: backendItem?.indicator || state.metric.toUpperCase(),
                        dataYear: backendItem?.data_year || Number(state.year),
                        source: backendItem?.source || 'FALLBACK',
                        sourceLabel,
                        method,
                        isFallback: !backendItem || backendItem?.is_fallback === true,
                        inRegionFocus,
                        itemStyle: state.region !== 'global' && !inRegionFocus
                            ? { areaColor: '#f5f5f5', opacity: 0.65 }
                            : undefined
                    };
                });

                mapChart.hideLoading();
                const hasInternational = mapData.some(i => i.sourceLabel === '国际数据');
                mapChart.setOption({
                    tooltip: {
                        trigger: 'item',
                        formatter: function (params) {
                            const d = params?.data || {};
                            const valueText = Number.isFinite(d.value) ? d.value.toFixed(2) : '--';
                            const fallbackText = d.isFallback ? '是（可复现）' : '否';
                            return [
                                `<b>${params.name || '未知地区'}</b>`,
                                `指标：${String(d.indicator || state.metric).toUpperCase()}`,
                                `数值：${valueText}`,
                                `年份：${d.dataYear || state.year}`,
                                `来源：${d.sourceLabel || '算法回退'} (${d.source || 'FALLBACK'})`,
                                `方法：${d.method || 'reproducible_fallback_v1'}`,
                                `缺失回退：${fallbackText}`
                            ].join('<br/>');
                        }
                    },
                    visualMap: {
                        min: 0,
                        max: 100,
                        text: ['高', '低'],
                        realtime: false,
                        calculable: true,
                        inRange: {
                            color: ['#e0f3f8', '#74add1', '#4575b4', '#313695']
                        },
                        show: true
                    },
                    series: [
                        {
                            name: 'World Health',
                            type: 'map',
                            map: 'world',
                            roam: false,
                            selectedMode: 'single',
                            select: {
                                disabled: false,
                                itemStyle: {
                                    areaColor: '#ffc53d',
                                    borderColor: '#fff',
                                    borderWidth: 1.5
                                },
                                label: {
                                    show: true,
                                    color: '#111'
                                }
                            },
                            emphasis: {
                                focus: 'self',
                                itemStyle: {
                                    areaColor: '#fadb14',
                                    borderColor: '#fff',
                                    borderWidth: 1
                                },
                                label: {
                                    show: true,
                                    color: '#000'
                                }
                            },
                            data: mapData
                        }
                    ]
                });
                mapChart.off('click');
                mapChart.on('click', (params) => {
                    activeMapCountry = params?.name || null;
                    if (!activeMapCountry) return;
                    mapChart.dispatchAction({
                        type: 'showTip',
                        seriesIndex: 0,
                        name: activeMapCountry
                    });
                });
                const statusChip = document.querySelector('.status-chip');
                if (statusChip) {
                    const strategy = hasInternational ? '国际数据优先' : '全量算法回退';
                    const fallbackCount = mapData.filter(i => i.isFallback).length;
                    statusChip.textContent = `${strategy} · 回退 ${fallbackCount}/${mapData.length}`;
                }
            } catch (e) {
                console.warn("加载世界地图数据失败", e);
                mapChart.showLoading({text: "地图加载失败: " + e.message, textColor: '#f5222d'});
            }
        }

        async function apply() {
            const state = getDashboardState();
            const statusChip = document.querySelector('.status-chip');
            if (statusChip) statusChip.textContent = '数据刷新中...';
            await Promise.all([
                renderKPI(state.region, state.metric, state.year),
                renderTrend(state.region, state.metric, state.year, state.granularity),
                Promise.resolve(renderPie(state.region)),
                Promise.resolve(renderReport(state.region, state.year)),
                renderMap(state)
            ]);
            if (statusChip) statusChip.textContent = `已更新 ${state.year}·${state.metric.toUpperCase()}`;
        }

        document.getElementById('applyBtn').addEventListener('click', async () => {
            await apply();
            // 平滑滚动到顶部或主图表区
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });
        document.getElementById('resetBtn').addEventListener('click', async () => {
            document.getElementById('region').value = 'global';
            document.getElementById('year').value = '2024';
            document.getElementById('granularity').value = 'year';
            document.getElementById('metric').value = 'dalys';
            await apply();
        });

        searchInput.addEventListener('input', e => renderNews(e.target.value));

        syncNavState();
        renderNews();
        apply();

        window.addEventListener('resize', () => {
            trendChart.resize();
            pieChart.resize();
            mapChart.resize();
        });
    </script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Update auth state in nav
            const userStr = localStorage.getItem('user') || localStorage.getItem('currentUser');
            if (userStr) {
                try {
                    const user = JSON.parse(userStr);
                    document.querySelectorAll('.guest-only').forEach(el => el.style.display = 'none');
                    document.querySelectorAll('.user-only').forEach(el => el.style.display = 'inline-flex');
                    if (user.role === 'admin') {
                        document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'inline-flex');
                    }
                } catch (e) {}
            }
        });
    </script>
