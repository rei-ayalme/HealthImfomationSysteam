<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@100..900&display=swap" rel="stylesheet">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户登录 - 健康数据洞察平台</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            /* 设置背景图片并添加毛玻璃动感效果 */
            background: url('/assets/images/login_bg.png') no-repeat center center fixed;
            background-size: cover;
            position: relative;
            font-family: 'Noto Sans SC', sans-serif;
        }

        /* 毛玻璃遮罩层 */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            z-index: 1;
        }

        .header {
            position: absolute;
            top: 24px;
            left: 24px;
            z-index: 10;
        }
        
        .back-link {
            color: #fff;
            text-decoration: none;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 4px;
            transition: opacity 0.3s;
        }
        
        .back-link:hover {
            opacity: 0.8;
        }

        .auth-card {
            width: 100%;
            max-width: 420px;
            /* 登录框的半透明毛玻璃效果 */
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 14px;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.3);
            padding: 32px;
            z-index: 2;
            position: relative;
            /* 动感浮现动画 */
            animation: floatUp 0.6s ease-out forwards;
        }
        
        @keyframes floatUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .title {
            font-size: 24px;
            font-weight: 700;
            color: #1a365d;
            margin-bottom: 8px;
            text-align: center;
        }

        .subtitle {
            font-size: 14px;
            color: #666;
            margin-bottom: 22px;
            text-align: center;
        }

        .field {
            margin-bottom: 14px;
        }

        .label {
            display: block;
            font-size: 13px;
            color: #444;
            margin-bottom: 6px;
        }

        .input {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #d9d9d9;
            border-radius: 6px;
            font-size: 14px;
            transition: all 0.3s;
        }

        .input:focus {
            border-color: #1890ff;
            outline: none;
            box-shadow: 0 0 0 2px rgba(24, 144, 255, 0.2);
        }

        .btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #1890ff, #096dd9);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 14px;
            box-shadow: 0 4px 12px rgba(24, 144, 255, 0.3);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(24, 144, 255, 0.4);
        }
        
        .btn:active {
            transform: translateY(1px);
        }

        .notice {
            display: none;
            margin-top: 16px;
            padding: 10px;
            background: #e6f7ff;
            border: 1px solid #91d5ff;
            border-radius: 6px;
            color: #1890ff;
            font-size: 13px;
            text-align: center;
        }

        .hint {
            margin-top: 20px;
            font-size: 13px;
            color: #666;
            text-align: center;
        }

        .hint a {
            color: #1890ff;
            text-decoration: none;
        }

        .hint a:hover {
            text-decoration: underline;
        }
    </style>
    <link rel="stylesheet" href="/assets/css/common.css">
    <script src="/assets/js/common.js"></script>
</head>
<body>
    <div class="header">
        <a href="/use/index.html" class="back-link">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="19" y1="12" x2="5" y2="12"></line>
                <polyline points="12 19 5 12 12 5"></polyline>
            </svg>
            返回首页
        </a>
    </div>
    <div class="auth-card">
        <div class="title">用户登录</div>
        <div class="subtitle">欢迎回到健康数据洞察平台</div>

        <form id="userLoginForm">
            <div class="field">
                <label class="label" for="accountInput">账号</label>
                <input id="accountInput" class="input" type="text" placeholder="请输入用户名或邮箱" required>
            </div>
            <div class="field">
                <label class="label" for="passwordInput">密码</label>
                <input id="passwordInput" class="input" type="password" placeholder="请输入密码" required>
            </div>
            <button class="btn" type="submit">登录</button>
        </form>

        <div id="notice" class="notice"></div>

        <div class="hint">管理员请使用 <a href="/admin/login.html">管理端登录</a></div>
        <div class="hint" style="margin-top: 8px;">还没有账号？ <a href="/use/register.html">立即注册</a></div>
    </div>

    <script>
        function showNotice(message) {
            const notice = document.getElementById('notice');
            notice.style.display = 'block';
            notice.textContent = message;
        }

        document.getElementById('userLoginForm').addEventListener('submit', async function (e) {
            e.preventDefault();

            const account = document.getElementById('accountInput').value.trim();
            const password = document.getElementById('passwordInput').value;

            if (!account || !password) {
                showNotice('请填写完整账号和密码');
                return;
            }

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: account, password: password })
                });

                if (response.ok) {
                    const data = await response.json();
                    localStorage.setItem('currentUser', JSON.stringify(data.user));
                    showNotice('登录成功，正在进入平台...');
                    
                    setTimeout(() => {
                        window.location.href = '/use/index.html';
                    }, 600);
                } else {
                    const error = await response.json();
                    showNotice(error.detail || '账号或密码错误，请重试');
                }
            } catch (error) {
                showNotice('网络错误，无法连接到服务器');
            }
        });
    </script>
</body>
</html>
