<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人管理端 - 健康数据洞察平台</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; background: #f0f2f5; color: #1a1a1a; }
        .top-nav { background: linear-gradient(135deg,#1a365d,#2c5282); color: #fff; height: 64px; display: flex; align-items: center; justify-content: space-between; padding: 0 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.15); }
        .logo { display: flex; align-items: center; gap: 10px; font-size: 19px; font-weight: 600; }
        .logo-icon { width: 36px; height: 36px; border-radius: 9px; background: linear-gradient(135deg,#4299e1,#63b3ed); display: flex; align-items: center; justify-content: center; }
        .nav-right { display: flex; gap: 10px; align-items: center; }
        .nav-btn { color: #fff; text-decoration: none; padding: 8px 12px; border-radius: 6px; font-size: 14px; }
        .nav-btn:hover { background: rgba(255,255,255,0.14); }
        .container { max-width: 1180px; margin: 24px auto; padding: 0 20px; }
        .hero { background: #fff; border-radius: 12px; padding: 20px; box-shadow: 0 3px 10px rgba(0,0,0,0.06); margin-bottom: 16px; display: flex; justify-content: space-between; align-items: center; }
        .hero-title { font-size: 22px; font-weight: 700; color: #1a365d; margin-bottom: 4px; }
        .hero-subtitle { color: #666; font-size: 13px; }
        .badge { background: #e6f7ff; color: #1677ff; border-radius: 16px; padding: 6px 12px; font-size: 12px; font-weight: 600; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-bottom: 16px; }
        .card { background: #fff; border-radius: 12px; padding: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        .card-title { font-size: 14px; color: #666; margin-bottom: 8px; }
        .card-value { font-size: 26px; font-weight: 700; color: #1a365d; }
        .section { background: #fff; border-radius: 12px; padding: 18px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); margin-bottom: 14px; }
        .section-title { font-size: 17px; font-weight: 700; color: #1a365d; margin-bottom: 12px; }
        .row { display: flex; gap: 12px; flex-wrap: wrap; }
        .item { background: #f7fbff; border: 1px solid #e6f4ff; border-radius: 8px; padding: 10px 12px; font-size: 13px; color: #334155; }
        .btn { border: none; border-radius: 8px; padding: 8px 12px; background: #1677ff; color: #fff; cursor: pointer; font-size: 13px; }
        @media (max-width: 900px) { .grid { grid-template-columns: 1fr; } .hero { flex-direction: column; align-items: flex-start; gap: 12px; } }
    </style>
</head>
<body>
    <nav class="top-nav">
        <div class="logo">
            <div class="logo-icon">👤</div>
            <span>健康数据平台 · 个人管理端</span>
        </div>
        <div class="nav-right">
            <a class="nav-btn" href="index.html">首页</a>
            <a class="nav-btn" href="datasets.html">数据集</a>
            <a class="nav-btn" href="../frontend-admin/dashboard.html">管理端</a>
            <a class="nav-btn" href="javascript:void(0)" onclick="logout()">退出</a>
        </div>
    </nav>
    <div class="container">
        <div class="hero">
            <div>
                <div class="hero-title" id="welcomeTitle">欢迎回来</div>
                <div class="hero-subtitle">这里管理你的个人分析偏好、收藏报告和下载记录</div>
            </div>
            <div class="badge" id="userBadge">普通用户</div>
        </div>
        <div class="grid">
            <div class="card"><div class="card-title">收藏报告</div><div class="card-value" id="favCount">0</div></div>
            <div class="card"><div class="card-title">下载次数</div><div class="card-value" id="downloadCount">0</div></div>
            <div class="card"><div class="card-title">偏好配置</div><div class="card-value" id="configCount">4</div></div>
        </div>
        <div class="section">
            <div class="section-title">账号信息</div>
            <div class="row" id="profileInfo"></div>
        </div>
        <div class="section">
            <div class="section-title">快捷功能</div>
            <div class="row">
                <a class="item" href="macro-analysis.html">宏观分析</a>
                <a class="item" href="meso-analysis.html">中观分析</a>
                <a class="item" href="micro-analysis.html">微观分析</a>
                <a class="item" href="prediction.html">预测模拟</a>
                <a class="item" href="datasets.html">数据集搜索</a>
            </div>
        </div>
        <div class="section">
            <div class="section-title">我的操作</div>
            <div class="row">
                <button class="btn" onclick="addDemoFavorite()">新增示例收藏</button>
                <button class="btn" onclick="addDemoDownload()">新增下载记录</button>
            </div>
        </div>
    </div>
    <script>
        function getCurrentUser() {
            try {
                const raw = localStorage.getItem('currentUser');
                return raw ? JSON.parse(raw) : null;
            } catch (_) {
                return null;
            }
        }
        function guardAuth() {
            const user = getCurrentUser();
            if (!user) {
                window.location.href = 'login.html';
                return null;
            }
            return user;
        }
        function renderProfile() {
            const user = guardAuth();
            if (!user) return;
            document.getElementById('welcomeTitle').textContent = `你好，${user.name || '用户'}`;
            document.getElementById('userBadge').textContent = user.role === 'user' ? '个人用户' : user.role;
            const favorites = JSON.parse(localStorage.getItem('userFavorites') || '[]');
            const downloads = JSON.parse(localStorage.getItem('userDownloads') || '[]');
            document.getElementById('favCount').textContent = favorites.length;
            document.getElementById('downloadCount').textContent = downloads.length;
            document.getElementById('profileInfo').innerHTML = `
                <div class="item">姓名：${user.name || '-'}</div>
                <div class="item">账号：${user.account || '-'}</div>
                <div class="item">邮箱：${user.email || '-'}</div>
                <div class="item">注册时间：${(user.createdAt || '').slice(0, 10) || '-'}</div>
            `;
        }
        function addDemoFavorite() {
            const arr = JSON.parse(localStorage.getItem('userFavorites') || '[]');
            arr.push({ id: Date.now(), title: '示例报告收藏', time: new Date().toISOString() });
            localStorage.setItem('userFavorites', JSON.stringify(arr));
            renderProfile();
        }
        function addDemoDownload() {
            const arr = JSON.parse(localStorage.getItem('userDownloads') || '[]');
            arr.push({ id: Date.now(), dataset: 'dalys', time: new Date().toISOString() });
            localStorage.setItem('userDownloads', JSON.stringify(arr));
            renderProfile();
        }
        function logout() {
            localStorage.removeItem('currentUser');
            window.location.href = 'login.html';
        }
        renderProfile();
    </script>
</body>
</html>
